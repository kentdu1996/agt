name: Bug report
description: Something went wrong with `agt`
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What command did you run, and what went wrong?
      placeholder: |
        $ agt new "..."
        ...error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versions
      description: Output of `agt --version` and `node -v`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
